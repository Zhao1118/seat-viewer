name: Update Seats Data

on:
  workflow_dispatch:
  repository_dispatch:
    types: [refresh-seats]

permissions:
  contents: write

jobs:
  update-seats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install mcporter
        run: npm install -g mcporter
        
      - name: Configure Tencent Docs token
        env:
          TENCENT_DOCS_TOKEN: ${{ secrets.TENCENT_DOCS_TOKEN }}
        run: |
          mcporter config add tencent-docs "https://docs.qq.com/openapi/mcp" \
            --header "Authorization=$TENCENT_DOCS_TOKEN" \
            --transport http \
            --scope home
        
      - name: Fetch seats data
        run: node scripts/fetch-seats.js
        
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/seats.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update seats data [skip ci]"
          git push
          
      - name: Summary
        if: success()
        run: |
          echo "✅ Seats data updated!"
          echo "📍 View: https://zhao1118.github.io/seat-viewer/"