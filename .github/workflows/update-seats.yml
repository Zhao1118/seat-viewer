name: Update Seats Data

on:
  schedule:
    - cron: '*/5 * * * *'  # 每5分钟运行一次
  repository_dispatch:
    types: [update-seats]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch seats data from Feishu
        env:
          FEISHU_APP_ID: cli_a97e4dd4ca78dbb4
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET || 'gBgfwEzq9l7rtycdCApWmf5ncJzl7i5s' }}
          SEATS_OUTPUT_PATH: seats.json
        run: node scripts/fetch-seats.js

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet seats.json || (git add seats.json && git commit -m "🔄 auto-update seats data $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)