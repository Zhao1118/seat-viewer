name: Update Seats Data

on:
  # 手动触发（从 Actions 面板）
  workflow_dispatch:
  # 通过 API 触发（从前端）
  repository_dispatch:
    types: [refresh-seats]

jobs:
  update-seats:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Fetch seats data
        env:
          TENCENT_DOCS_TOKEN: ${{ secrets.TENCENT_DOCS_TOKEN }}
        run: node scripts/fetch-seats.js
        
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/seats.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update seats data [skip ci]"
          git push
          
      - name: Summary
        if: success()
        run: |
          echo "✅ Seats data updated!"
          echo "📍 View: https://zhao1118.github.io/seat-viewer/"
